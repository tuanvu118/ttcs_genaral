name: ttcs-local

x-common-environment: &common-environment
  BACKEND_CONTAINER_PORT: 8000
  JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  MONGO_HOST: mongodb
  MONGO_PORT: 27017
  MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ttcs_root}
  MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me_mongo_root_password}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: ${REDIS_DB:-0}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-20}
  RABBITMQ_CHECKIN_EXCHANGE: ${RABBITMQ_CHECKIN_EXCHANGE:-attendance.events}
  RABBITMQ_CHECKIN_QUEUE: ${RABBITMQ_CHECKIN_QUEUE:-attendance.checkin.queue}
  RABBITMQ_CHECKIN_ROUTING_KEY: ${RABBITMQ_CHECKIN_ROUTING_KEY:-attendance.checkin.requested}
  RABBITMQ_CHECKIN_RETRY_EXCHANGE: ${RABBITMQ_CHECKIN_RETRY_EXCHANGE:-attendance.retry}
  RABBITMQ_CHECKIN_RETRY_QUEUE: ${RABBITMQ_CHECKIN_RETRY_QUEUE:-attendance.checkin.retry.queue}
  RABBITMQ_CHECKIN_RETRY_ROUTING_KEY: ${RABBITMQ_CHECKIN_RETRY_ROUTING_KEY:-attendance.checkin.retry}
  RABBITMQ_CHECKIN_DEAD_LETTER_EXCHANGE: ${RABBITMQ_CHECKIN_DEAD_LETTER_EXCHANGE:-attendance.dead}
  RABBITMQ_CHECKIN_DEAD_LETTER_QUEUE: ${RABBITMQ_CHECKIN_DEAD_LETTER_QUEUE:-attendance.checkin.dlq}
  RABBITMQ_CHECKIN_DEAD_LETTER_ROUTING_KEY: ${RABBITMQ_CHECKIN_DEAD_LETTER_ROUTING_KEY:-attendance.checkin.failed}
  RABBITMQ_CHECKIN_MAX_RETRIES: ${RABBITMQ_CHECKIN_MAX_RETRIES:-3}
  RABBITMQ_CHECKIN_RETRY_DELAY_MS: ${RABBITMQ_CHECKIN_RETRY_DELAY_MS:-5000}
  RABBITMQ_REGISTRATION_SYNC_EXCHANGE: ${RABBITMQ_REGISTRATION_SYNC_EXCHANGE:-registration.sync.events}
  RABBITMQ_REGISTRATION_SYNC_QUEUE: ${RABBITMQ_REGISTRATION_SYNC_QUEUE:-registration.sync.queue}
  RABBITMQ_REGISTRATION_SYNC_ROUTING_KEY: ${RABBITMQ_REGISTRATION_SYNC_ROUTING_KEY:-registration.sync.requested}
  QR_SESSION_TTL_BUFFER_SECONDS: ${QR_SESSION_TTL_BUFFER_SECONDS:-300}
  QR_DUPLICATE_PENDING_TTL_SECONDS: ${QR_DUPLICATE_PENDING_TTL_SECONDS:-120}
  QR_DUPLICATE_COMPLETED_TTL_SECONDS: ${QR_DUPLICATE_COMPLETED_TTL_SECONDS:-86400}
  QR_CHECKIN_LOCK_TTL_SECONDS: ${QR_CHECKIN_LOCK_TTL_SECONDS:-30}
  QR_DEFAULT_WINDOW_SECONDS: ${QR_DEFAULT_WINDOW_SECONDS:-30}
  QR_MAX_WINDOWS_PER_SESSION: ${QR_MAX_WINDOWS_PER_SESSION:-720}
  HTSK_REGISTER_LOCK_TTL_SECONDS: ${HTSK_REGISTER_LOCK_TTL_SECONDS:-10}
  ATTENDANCE_MANUAL_CODE_LENGTH: ${ATTENDANCE_MANUAL_CODE_LENGTH:-8}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost,http://api.localhost,http://qr.localhost}
  CLOUDINARY_NAME: ${CLOUDINARY_NAME:-}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
  CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-}

x-python-service: &python-service
  restart: unless-stopped
  env_file:
    - .env.local
  networks:
    - ttcs

services:
  gateway:
    image: caddy:2-alpine
    depends_on:
      frontend:
        condition: service_started
      be-service-api:
        condition: service_healthy
      qr-service-api:
        condition: service_healthy
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
    volumes:
      - ../api_gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - gateway_data:/data
      - gateway_config:/config
    restart: unless-stopped
    networks:
      - ttcs

  frontend:
    build:
      context: ../fe_ttcs
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - ttcs

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ttcs_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change_me_mongo_root_password}
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - ttcs

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ttcs

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ttcs

  be-service-api:
    <<: *python-service
    build:
      context: ../be_service_ttcs
      dockerfile: Dockerfile
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    environment:
      <<: *common-environment
      MONGO_DATABASE: ${BE_MONGO_DATABASE:-ttcs}
      ENABLE_APP_SCHEDULER: "false"
    volumes:
      - ../be_service_ttcs:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  be-service-scheduler:
    <<: *python-service
    build:
      context: ../be_service_ttcs
      dockerfile: Dockerfile
    working_dir: /app
    command: python -m scheduler.main
    environment:
      <<: *common-environment
      MONGO_DATABASE: ${BE_MONGO_DATABASE:-ttcs}
      ENABLE_APP_SCHEDULER: "false"
    volumes:
      - ../be_service_ttcs:/app
    depends_on:
      mongodb:
        condition: service_healthy

  qr-service-api:
    <<: *python-service
    build:
      context: ../qr_service_be_ttcs
      dockerfile: Dockerfile
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    environment:
      <<: *common-environment
      MONGO_DATABASE: ${QR_MONGO_DATABASE:-qr_attendance_db}
      ENABLE_APP_SCHEDULER: "false"
    volumes:
      - ../qr_service_be_ttcs:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  qr-sync-worker:
    <<: *python-service
    build:
      context: ../qr_service_be_ttcs
      dockerfile: Dockerfile
    working_dir: /app
    command: python -m worker.sync_worker
    environment:
      <<: *common-environment
      MONGO_DATABASE: ${QR_MONGO_DATABASE:-qr_attendance_db}
      ENABLE_APP_SCHEDULER: "false"
    volumes:
      - ../qr_service_be_ttcs:/app
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  qr-attendance-worker:
    <<: *python-service
    build:
      context: ../qr_service_be_ttcs
      dockerfile: Dockerfile
    working_dir: /app
    command: python -m worker.attendance_worker
    environment:
      <<: *common-environment
      MONGO_DATABASE: ${QR_MONGO_DATABASE:-qr_attendance_db}
      ENABLE_APP_SCHEDULER: "false"
    volumes:
      - ../qr_service_be_ttcs:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  gateway_data:
  gateway_config:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  ttcs:
    name: ttcs_local
